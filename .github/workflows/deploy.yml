name: Deploy static content to Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Filter files
        run: |
          mkdir deploy
          find . -not -path './.git/*' \( \
            -name "*.woff2" -o \
            -name "*.html" -o \
            -name "*.ico" -o \
            -name "*.css" -o \
            -name "*.js" -o \
            -name "*.png" -o \
            -name "*.jpg" \
          \) -exec cp --parents {} deploy/ \;
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: "deploy"
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4.0.5
